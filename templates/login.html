{% extends "base.html" %}
{% block title %}Login - Placement Portal{% endblock %}
{% block content %}

<style>
  .pp-page{
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  min-height: 80vh;
}
.pp-card-frame{
  width: 100%;
  max-width: 420px;
  margin: 0 auto;
}
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&display=swap');

  .pp-bg{
    position:fixed; inset:0; z-index:-1; overflow:hidden;
    background: radial-gradient(1200px 800px at 15% -10%, #123159 0%, #0A1F3D 55%, #071527 100%);
  }
  .pp-bg::before{
    content:""; position:absolute; inset:-60px;
    background-image: radial-gradient(rgba(231,168,61,0.12) 1px, transparent 1px);
    background-size: 28px 28px;
    animation: pp-drift 40s linear infinite;
  }
  @keyframes pp-drift{ from{transform:translate(0,0);} to{transform:translate(-28px,-28px);} }

  .pp-orb{ position:absolute; border-radius:50%; filter:blur(70px); opacity:.32; animation: pp-float 14s ease-in-out infinite; }
  .pp-orb-1{ width:340px; height:340px; background:#E7A83D; top:-90px; left:-70px; }
  .pp-orb-2{ width:280px; height:280px; background:#35D08C; bottom:-70px; right:-50px; animation-delay:-6s; }
  @keyframes pp-float{ 0%,100%{transform:translate(0,0);} 50%{transform:translate(18px,-22px);} }

  .pp-page{ min-height: 80vh; }

  .pp-card-frame{ position:relative; border-radius:22px; }
  .pp-card-frame::before{
    content:""; position:absolute; inset:-2px; z-index:0; border-radius:22px;
    background: conic-gradient(from 0deg, #E7A83D, #35D08C, #123159, #E7A83D);
    opacity:.5; filter:blur(3px);
    animation: pp-spin 6s linear infinite;
  }
  @keyframes pp-spin{ to{ transform:rotate(360deg); } }

  .pp-card{
    position:relative; z-index:1;
    background:rgba(247,249,252,0.92);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-radius:20px;
    padding:2.25rem 2rem 1.75rem;
    box-shadow: 0 24px 60px -20px rgba(6,16,33,0.55), 0 0 0 1px rgba(255,255,255,0.5) inset;
    transform-style:preserve-3d;
    transition: transform .25s ease;
    animation: pp-card-in .7s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes pp-card-in{ from{opacity:0; transform:translateY(24px) scale(.97);} to{opacity:1; transform:none;} }

  .pp-anim{ opacity:0; animation: pp-fade-up .55s ease forwards; animation-delay: calc(var(--d,0) * .09s + .15s); }
  @keyframes pp-fade-up{ from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;} }

  .pp-emblem{
    width:52px; height:52px; margin:0 auto .9rem; border-radius:50%;
    background: linear-gradient(135deg,#123159,#0A1F3D);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 8px 20px -6px rgba(10,31,61,.5), 0 0 0 4px rgba(231,168,61,.15);
    animation: pp-emblem-float 4s ease-in-out infinite;
  }
  @keyframes pp-emblem-float{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-4px);} }

  .pp-badge{
    display:inline-flex; align-items:center; gap:.4rem;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size:.65rem; letter-spacing:.08em; text-transform:uppercase;
    color:#12693f; background:rgba(53,208,140,0.12);
    border:1px solid rgba(53,208,140,0.35);
    padding:.3rem .6rem; border-radius:999px; margin-bottom:1rem;
  }
  .pp-dot{ width:6px; height:6px; border-radius:50%; background:#35D08C; animation: pp-pulse 1.8s infinite; }
  @keyframes pp-pulse{ 0%{box-shadow:0 0 0 0 rgba(53,208,140,.5);} 70%{box-shadow:0 0 0 6px rgba(53,208,140,0);} 100%{box-shadow:0 0 0 0 rgba(53,208,140,0);} }

  .pp-path{ width:100%; max-width:220px; display:block; margin:0 auto .35rem; }
  .pp-path-line{ stroke-dasharray:300; stroke-dashoffset:300; animation: pp-draw 1.6s .3s ease forwards; }
  @keyframes pp-draw{ to{stroke-dashoffset:0;} }
  .pp-node{ opacity:0; transform-box: fill-box; transform-origin:center; animation: pp-node-in .4s ease forwards; animation-delay: calc(.5s + var(--n) * .35s); }
  @keyframes pp-node-in{ from{opacity:0; transform:scale(0);} to{opacity:1; transform:scale(1);} }
  .pp-node-final{ filter: drop-shadow(0 0 6px rgba(231,168,61,.8)); }
  .pp-ping{ opacity:0; transform-box: fill-box; transform-origin:center; animation: pp-ping-anim 2.2s 2s ease-out infinite; }
  @keyframes pp-ping-anim{ 0%{opacity:.6; transform:scale(1);} 100%{opacity:0; transform:scale(2.6);} }
  .pp-path-labels{
    display:flex; justify-content:space-between; max-width:220px; margin:0 auto 1.1rem;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size:.6rem; letter-spacing:.06em; text-transform:uppercase; color:#8a97a8;
  }

  .pp-title{ font-family:'Space Grotesk', system-ui, sans-serif; font-weight:700; font-size:1.8rem; color:#0F1B2D; letter-spacing:-.01em; margin-bottom:.15rem; }
  .pp-subtitle{ font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size:.68rem; letter-spacing:.14em; text-transform:uppercase; color:#5b6b82; }

  .pp-field{ position:relative; }
  .pp-field .form-control{
    text-align:center;
    border:1.5px solid #dfe4ea; border-radius:12px;
    background:rgba(255,255,255,.7);
    transition: border-color .25s, box-shadow .25s, background .25s;
  }
  .pp-field .form-control:focus{ border-color:#E7A83D; box-shadow:0 0 0 4px rgba(231,168,61,.15); background:#fff; }
  .pp-field > label{ width:100%; text-align:center; color:#7c8798; }

  .pp-btn{
    position:relative; overflow:hidden; border:none; border-radius:12px;
    background:linear-gradient(135deg,#E7A83D,#c9822a); color:#0A1F3D;
    font-family:'Space Grotesk',system-ui,sans-serif; letter-spacing:.02em;
    box-shadow:0 10px 24px -8px rgba(231,168,61,.55);
    transition: transform .2s ease, box-shadow .2s ease;
  }
  .pp-btn:hover{ transform:translateY(-2px); box-shadow:0 14px 30px -8px rgba(231,168,61,.65); color:#0A1F3D; }
  .pp-btn:active{ transform:translateY(0); }
  .pp-btn::before{
    content:""; position:absolute; top:0; left:-60%; width:40%; height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,.55), transparent);
    transform:skewX(-20deg); transition:left .6s ease;
  }
  .pp-btn:hover::before{ left:120%; }

  .pp-btn-outline{
    position:relative; overflow:hidden;
    border:1.5px solid #d7dde6; color:#33455e; border-radius:10px; background:#fff;
    font-size:.8rem; display:inline-flex; align-items:center; gap:.35rem;
    transition: all .2s ease;
  }
  .pp-btn-outline:hover{ border-color:#E7A83D; color:#0A1F3D; background:#FBF3E4; transform:translateY(-1px); }

  .pp-ripple{ position:absolute; border-radius:50%; background:rgba(255,255,255,.55); transform:scale(0); animation: pp-ripple-anim .6s ease-out; pointer-events:none; }
  @keyframes pp-ripple-anim{ to{ transform:scale(3); opacity:0; } }

  .pp-btn:focus-visible, .pp-btn-outline:focus-visible, .pp-field .form-control:focus-visible{
    outline:2px solid #E7A83D; outline-offset:2px;
  }

  @media (prefers-reduced-motion: reduce){
    .pp-bg::before, .pp-orb, .pp-card, .pp-anim, .pp-path-line, .pp-node, .pp-ping, .pp-dot,
    .pp-btn::before, .pp-ripple, .pp-card-frame::before, .pp-emblem{
      animation: none !important; transition: none !important; opacity:1 !important; transform:none !important; stroke-dashoffset:0 !important;
    }
  }
</style>

<div class="pp-bg" aria-hidden="true">
  <div class="pp-orb pp-orb-1"></div>
  <div class="pp-orb pp-orb-2"></div>
</div>

<div class="row justify-content-center align-items-center py-4 pp-page">
  <div class="col-md-5 col-lg-4">
    <div class="pp-card-frame">
      <div class="pp-card">

        <div class="text-center pp-anim" style="--d:0">
          <div class="pp-emblem">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#E7A83D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 10L12 4 2 10l10 6 10-6z"/>
              <path d="M6 12v5c0 1.5 2.7 3 6 3s6-1.5 6-3v-5"/>
            </svg>
          </div>

          <span class="pp-badge"><span class="pp-dot"></span>Verified Placement Cell</span>

          <svg class="pp-path" viewBox="0 0 260 70" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M20 50 C 80 50, 90 20, 130 25 C 170 30, 180 15, 240 15" stroke="#E7A83D" stroke-width="2.5" stroke-linecap="round" class="pp-path-line"/>
            <circle cx="20" cy="50" r="5" fill="#0A1F3D" class="pp-node" style="--n:0"/>
            <circle cx="130" cy="25" r="5" fill="#0A1F3D" class="pp-node" style="--n:1"/>
            <circle cx="240" cy="15" r="6" fill="#E7A83D" class="pp-node pp-node-final" style="--n:2"/>
            <circle cx="240" cy="15" r="6" fill="none" stroke="#E7A83D" stroke-width="2" class="pp-ping"/>
          </svg>
          <div class="pp-path-labels"><span>Campus</span><span>Interview</span><span>Offer</span></div>

          <h2 class="pp-title mt-2">Portal Login</h2>
          <p class="pp-subtitle mb-4">University Placement Cell</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST">
          <div class="form-floating mb-3 pp-field pp-anim" style="--d:1">
            <input type="email" name="email" class="form-control" id="emailInput" placeholder="name@university.edu" required autofocus>
            <label for="emailInput">Email Address</label>
          </div>

          <div class="form-floating mb-4 pp-field pp-anim" style="--d:2">
            <input type="password" name="password" class="form-control" id="passwordInput" placeholder="Password" required>
            <label for="passwordInput">Password</label>
          </div>

          <button type="submit" class="btn pp-btn w-100 py-2 fw-bold mb-3 pp-anim" style="--d:3">
            Sign In
          </button>

          <div class="text-center mt-4 pt-3 border-top pp-anim" style="--d:4">
            <p class="small text-muted mb-2">Need an account?</p>
            <div class="d-flex flex-wrap justify-content-center gap-2">
              <a href="{{ url_for('student_registration') }}" class="btn pp-btn-outline btn-sm">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10L12 4 2 10l10 6 10-6z"/><path d="M6 12v5c0 1.5 2.7 3 6 3s6-1.5 6-3v-5"/></svg>
                Student Register
              </a>
              <a href="{{ url_for('company_registration') }}" class="btn pp-btn-outline btn-sm">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V7l7-4 7 4v14"/><path d="M9 9h1M9 13h1M14 9h1M14 13h1M9 21v-4h6v4"/></svg>
                Company Register
              </a>
            </div>
          </div>
        </form>

      </div>
    </div>
  </div>
</div>

<script>
  document.querySelectorAll('.pp-btn, .pp-btn-outline').forEach(function(btn){
    btn.addEventListener('click', function(e){
      var rect = this.getBoundingClientRect();
      var ripple = document.createElement('span');
      var size = Math.max(rect.width, rect.height);
      ripple.className = 'pp-ripple';
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
      ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
      this.appendChild(ripple);
      setTimeout(function(){ ripple.remove(); }, 600);
    });
  });

  var card = document.querySelector('.pp-card');
  var fine = window.matchMedia('(pointer: fine)').matches;
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (card && fine && !reduced) {
    card.addEventListener('mousemove', function(e){
      var r = card.getBoundingClientRect();
      var x = (e.clientX - r.left) / r.width - 0.5;
      var y = (e.clientY - r.top) / r.height - 0.5;
      card.style.transform = 'rotateY(' + (x * 4) + 'deg) rotateX(' + (-y * 4) + 'deg)';
    });
    card.addEventListener('mouseleave', function(){ card.style.transform = ''; });
  }
</script>

{% endblock %}
